name: Finance News Bot

on:
  schedule:
    - cron: '0 14 * * 1-5'    # US Pre-Market (6:00 AM PST)
    - cron: '30 18 * * 1-5'   # US Mid-Day (10:30 AM PST)
    - cron: '0 6 * * 0-5'     # Asia Market (10:00 PM PST)
  
  workflow_dispatch:
    inputs:
      session:
        description: 'Which session to run'
        required: true
        default: 'us_premarket'
        type: choice
        options:
          - us_premarket
          - us_midday
          - asia

jobs:
  send-news:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install discord.py requests
      
      - name: Determine session
        run: |
          # Manual trigger: use the input session directly
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            SESSION="${{ github.event.inputs.session }}"
          # Scheduled trigger: map cron string directly to session
          # This is DETERMINISTIC regardless of GitHub Actions queue delays
          elif [ "${{ github.event.schedule }}" == "0 14 * * 1-5" ]; then
            SESSION="us_premarket"
          elif [ "${{ github.event.schedule }}" == "30 18 * * 1-5" ]; then
            SESSION="us_midday"
          elif [ "${{ github.event.schedule }}" == "0 6 * * 0-5" ]; then
            SESSION="asia"
          else
            # Fallback (should never happen)
            SESSION="us_premarket"
          fi
          
          echo "SESSION=$SESSION" >> $GITHUB_ENV
          echo "Event name: ${{ github.event_name }}"
          echo "Cron schedule: ${{ github.event.schedule }}"
          echo "Determined session: $SESSION"
          echo "Current UTC time: $(date -u '+%Y-%m-%d %H:%M:%S')"
      
      - name: Run bot
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          DISCORD_CHANNEL_ID: ${{ secrets.DISCORD_CHANNEL_ID }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          SESSION: ${{ env.SESSION }}
        run: python bot_enhanced.py
