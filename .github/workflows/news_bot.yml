name: Finance News Bot

on:
  schedule:
    - cron: '0 14 * * 1-5'
    - cron: '30 18 * * 1-5'
    - cron: '0 6 * * 0-4'
  
  workflow_dispatch:
    inputs:
      session:
        description: 'Which session to run'
        required: true
        default: 'us_premarket'
        type: choice
        options:
          - us_premarket
          - us_midday
          - asia

jobs:
  send-news:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install discord.py requests
      
      - name: Determine session
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            SESSION="${{ github.event.inputs.session }}"
          else
            HOUR=$(date -u +%H)
            MINUTE=$(date -u +%M)
            if [ "$HOUR" == "14" ]; then
              SESSION="us_premarket"
            elif [ "$HOUR" == "18" ] && [ "$MINUTE" -ge "30" ]; then
              SESSION="us_midday"
            elif [ "$HOUR" == "06" ]; then
              SESSION="asia"
            else
              SESSION="us_premarket"
            fi
          fi
          echo "SESSION=$SESSION" >> $GITHUB_ENV
          echo "Running session: $SESSION"
      
      - name: Run bot
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          DISCORD_CHANNEL_ID: ${{ secrets.DISCORD_CHANNEL_ID }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          SESSION: ${{ env.SESSION }}
        run: python bot_enhanced.py
