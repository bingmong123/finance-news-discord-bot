name: Finance News Bot

on:
  schedule:
    - cron: '0 14 * * 1-5'
    - cron: '30 18 * * 1-5'
    - cron: '0 6 * * 0-5'
  
  workflow_dispatch:
    inputs:
      session:
        description: 'Which session to run'
        required: true
        default: 'us_premarket'
        type: choice
        options:
          - us_premarket
          - us_midday
          - asia

jobs:
  send-news:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install discord.py requests
      
      - name: Determine session
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            SESSION="${{ github.event.inputs.session }}"
          else
            HOUR=$(date -u +%H)
            MINUTE=$(date -u +%M)
            
            # Determine which cron triggered based on time window
            # us_premarket: 14:00-14:59 UTC (Mon-Fri)
            if [ "$HOUR" == "14" ]; then
              SESSION="us_premarket"
            # us_midday: 18:15-19:15 UTC (Mon-Fri) - wider window for delays
            elif ([ "$HOUR" == "18" ] && [ "$MINUTE" -ge "15" ]) || ([ "$HOUR" == "19" ] && [ "$MINUTE" -lt "15" ]); then
              SESSION="us_midday"
            # asia: 05:45-06:45 UTC (Sun-Sat) - wider window for delays
            elif ([ "$HOUR" == "05" ] && [ "$MINUTE" -ge "45" ]) || ([ "$HOUR" == "06" ] && [ "$MINUTE" -lt "45" ]); then
              SESSION="asia"
            else
              SESSION="us_premarket"
            fi
          fi
          echo "SESSION=$SESSION" >> $GITHUB_ENV
          echo "Determined session: $SESSION"
          echo "Current UTC time: $(date -u '+%Y-%m-%d %H:%M:%S')"
      
      - name: Run bot
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          DISCORD_CHANNEL_ID: ${{ secrets.DISCORD_CHANNEL_ID }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          SESSION: ${{ env.SESSION }}
        run: python bot_enhanced.py
