name: Finance News Bot

# ============================================================
# Schedule is in UTC. Currently set for PST (UTC-8).
# When DST starts in March 2027, subtract 1 hour from each UTC time.
# Example: '0 14' → '0 13' for PDT
# ============================================================

on:
  schedule:
    # 🇺🇸 US Pre-market: 6:00 AM PST = 14:00 UTC (Mon-Fri)
    # Covers overnight news + weekend (Mon morning catches Fri-Sun)
    - cron: '0 14 * * 1-5'
    
    # 📊 US Mid Day: 10:30 AM PST = 18:30 UTC (Mon-Fri)
    # Market check-in during trading hours
    - cron: '30 18 * * 1-5'
    
    # 🌏 Asia Market: 10:00 PM PST = 06:00 UTC next day
    # = 2:00 PM Beijing time (after lunch, before close)
    # Sun-Thu PST nights = Mon-Fri UTC days
    - cron: '0 6 * * 0-4'
  
  # Manual trigger from GitHub UI (great for testing)
  workflow_dispatch:
    inputs:
      session:
        description: 'Which session to run'
        required: true
        default: 'us_premarket'
        type: choice
        options:
          - us_premarket
          - us_midday
          - asia

jobs:
  send-news:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install discord.py requests
      
      - name: Determine session
        id: session
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            # Manual trigger uses dropdown selection
            echo "session=${{ github.event.inputs.session }}" >> $GITHUB_OUTPUT
          else
            # Scheduled trigger: detect by UTC hour and minute
            HOUR=$(date -u +%H)
            MINUTE=$(date -u +%M)
            if [ "$HOUR" == "14" ]; then
              echo "session=us_premarket" >> $GITHUB_OUTPUT
            elif [ "$HOUR" == "18" ] && [ "$MINUTE" -ge "30" ]; then
              echo "session=us_midday" >> $GITHUB_OUTPUT
            elif [ "$HOUR" == "06" ]; then
              echo "session=asia" >> $GITHUB_OUTPUT
            else
              # Fallback to us_premarket
              echo "session=us_premarket" >> $GITHUB_OUTPUT
            fi
          fi
      
      - name: Run bot
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          DISCORD_CHANNEL_ID: ${{ secrets.DISCORD_CHANNEL_ID }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          SESSION: ${{ steps.session.outputs.session }}
        run: python bot_enhanced.py
