name: Finance News Bot

# ============================================================
# Schedule is in UTC. Currently set for PST (UTC-8).
# When DST starts in March 2027, subtract 1 hour from each UTC time.
# Example: '0 14' → '0 13' for PDT
# ============================================================

on:
  schedule:
    # 🇺🇸 US Pre-market: 6:00 AM PST = 14:00 UTC (Mon-Fri)
    # Covers overnight news + weekend (Mon morning catches Fri-Sun)
    - cron: '0 14 * * 1-5'
    
    # 📊 US Midday #1: 9:00 AM PST = 17:00 UTC (Mon-Fri)
    # 2.5 hours after market open, sees how stocks reacted
    - cron: '0 17 * * 1-5'
    
    # 📊 US Midday #2: 11:30 AM PST = 19:30 UTC (Mon-Fri)
    # 1.5 hours before close, late-session moves
    - cron: '30 19 * * 1-5'
    
    # 🌏 Asia Pre-market: 10:00 PM PST = 06:00 UTC next day
    # = 2:00 PM Beijing time (after lunch, before close)
    # Sun-Thu PST nights = Mon-Fri UTC days
    - cron: '0 6 * * 0-4'
  
  # Manual trigger from GitHub UI (great for testing)
  workflow_dispatch:
    inputs:
      session:
        description: 'Which session to run'
        required: true
        default: 'us_premarket'
        type: choice
        options:
          - us_premarket
          - us_midday
          - asia

jobs:
  send-news:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install discord.py requests
      
      - name: Determine session
        id: session
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            # Manual trigger uses dropdown selection
            echo "session=${{ github.event.inputs.session }}" >> $GITHUB_OUTPUT
          else
            # Scheduled trigger: detect by UTC hour
            HOUR=$(date -u +%H)
            if [ "$HOUR" == "13" ]; then
              echo "session=us_premarket" >> $GITHUB_OUTPUT
            elif [ "$HOUR" == "03" ]; then
              echo "session=asia" >> $GITHUB_OUTPUT
            else
              # Catches both midday slots (16:00 and 18:30 UTC)
              echo "session=us_midday" >> $GITHUB_OUTPUT
            fi
          fi
      
      - name: Run bot
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          DISCORD_CHANNEL_ID: ${{ secrets.DISCORD_CHANNEL_ID }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          SESSION: ${{ steps.session.outputs.session }}
        run: python bot_enhanced.py
