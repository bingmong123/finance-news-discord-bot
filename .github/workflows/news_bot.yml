name: Finance News Bot

# ============================================================
# TRIGGER: Google Cloud Scheduler → repository_dispatch
#   Fires at exact PT times via GitHub API — no queue delays.
#   GitHub Actions is execution only. Scheduling is handled
#   entirely by Google Cloud Scheduler (3 free jobs).
# ============================================================

on:
  # 🌩️ Google Cloud Scheduler fires this via GitHub API
  repository_dispatch:
    types: [finance_news_trigger]

  # 🖐️ Manual trigger from GitHub UI (for testing)
  workflow_dispatch:
    inputs:
      session:
        description: 'Which session to run'
        required: true
        default: 'us_premarket'
        type: choice
        options:
          - us_premarket
          - us_midday
          - asia

jobs:
  send-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install discord.py requests

      - name: Determine session
        id: session
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            # Manual trigger — use the dropdown
            echo "session=${{ github.event.inputs.session }}" >> $GITHUB_OUTPUT
          else
            # Google Cloud Scheduler — session passed in payload
            echo "session=${{ github.event.client_payload.session }}" >> $GITHUB_OUTPUT
          fi

      - name: Run bot
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          DISCORD_CHANNEL_ID: ${{ secrets.DISCORD_CHANNEL_ID }}
          SESSION: ${{ steps.session.outputs.session }}
        run: python bot_enhanced.py
